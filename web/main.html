<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bot Control Panel</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="server.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h3>Bot Configuration</h3>
        <div class="input-group">
            <input type="text" id="host" placeholder="Server IP (e.g., play.minesteal.xyz)" value="play.minesteal.xyz">
            <input type="text" id="user" placeholder="Bot Username">
            <input type="password" id="pass" placeholder="Minecraft Password">
        </div>
        <button class="btn-launch" onclick="launchBot()">LAUNCH BOT</button>
        <button id="btn-disconnect" class="btn-disconnect">DISCONNECT BOT</button>
        
        <div class="status-bar">
            <span id="status-dot" class="status-dot"></span>
            Status: <span id="status-text">Disconnected</span>
        </div>
    </div>

    <div id="console"></div>

    <div class="card" style="margin-top: 20px;">
        <div class="input-group">
            <input type="text" id="cmd" placeholder="Type a message or command..." style="flex: 4;">
            <button class="btn-send" onclick="sendCmd()">SEND</button>
        </div>
    </div>
</div>
</body>
</html>
